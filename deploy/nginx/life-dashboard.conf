# lifedashboard.fit (Namecheap)
Install: sudo cp this file to /etc/nginx/sites-available/life-dashboard
        sudo ln -s /etc/nginx/sites-available/life-dashboard /etc/nginx/sites-enabled/
        sudo nginx -t && sudo systemctl reload nginx
# Then:   sudo certbot --nginx -d lifedashboard.fit -d www.lifedashboard.fit -d api.lifedashboard.fit

# Frontend
server {
    listen 80;
    server_name lifedashboard.fit www.lifedashboard.fit;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API
server {
    listen 80;
    server_name api.lifedashboard.fit;
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
